name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION (must be x.y.z)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [[ "$PACKAGE_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "Tag version ${{ steps.version.outputs.version }} does not match pyproject.toml version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag_name }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "Release ${{ steps.version.outputs.version }}

          Python: >=3.10
          Supported versions: 3.10, 3.11, 3.12, 3.13, 3.14

          Install with:
          \`\`\`bash
          pip install twobitreader==${{ steps.version.outputs.version }}
          \`\`\`"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 30
